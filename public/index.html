<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ottawa New Build Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Loading screen — hidden once app is ready -->
  <div id="loading-screen">
    <div class="loading-inner">
      <div class="loading-dot-ring">
        <div></div><div></div><div></div><div></div>
      </div>
      <div class="loading-title">Ottawa New Builds</div>
      <div class="loading-sub">Loading communities…</div>
    </div>
  </div>

  <div id="app">

    <!-- Top Bar -->
    <header id="topbar">
      <!-- Always-visible slim row -->
      <div id="topbar-main">
        <div id="brand">
          <div class="dot"></div>
          Ottawa New Builds
        </div>
        <div class="topbar-spacer"></div>
        <div id="count-label"><span id="count-num">–</span> builds</div>
        <button class="icon-btn" id="btn-theme" title="Toggle dark/light mode" aria-label="Toggle theme">&#9788;</button>
        <button class="icon-btn" id="btn-legend-toggle" title="Toggle builder legend" aria-label="Toggle legend">&#11041;</button>
        <button class="icon-btn" id="btn-filters-toggle" title="Toggle filters" aria-label="Toggle filters">&#9776;</button>
      </div>

      <!-- Collapsible filters row -->
      <div id="topbar-filters">
        <div class="filter-group">
          <span class="filter-label">Area</span>
          <select id="filter-community" class="filter-select">
            <option value="">All Areas</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Category</span>
          <select id="filter-hometype" class="filter-select">
            <option value="">All</option>
            <option value="Single Family">Single Family</option>
            <option value="Townhomes">Townhomes</option>
            <option value="Condo">Condo</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Beds</span>
          <select id="filter-beds" class="filter-select">
            <option value="">Any</option>
            <option value="=2">2 beds</option>
            <option value="2+">2+ beds</option>
            <option value="=3">3 beds</option>
            <option value="3+">3+ beds</option>
            <option value="=4">4 beds</option>
            <option value="4+">4+ beds</option>
            <option value="=5">5 beds</option>
            <option value="5+">5+ beds</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Baths</span>
          <select id="filter-baths" class="filter-select">
            <option value="">Any</option>
            <option value="2">2+</option>
            <option value="3">3+</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Sqft</span>
          <select id="filter-sqft" class="filter-select">
            <option value="">Any</option>
            <option value="<1000">&lt; 1,000</option>
            <option value="1000">1,000+</option>
            <option value="1500">1,500+</option>
            <option value="2000">2,000+</option>
            <option value="2500">2,500+</option>
            <option value="3000">3,000+</option>
          </select>
        </div>
        <div class="filter-group">
          <span class="filter-label">Lot</span>
          <select id="filter-lot" class="filter-select">
            <option value="">Any</option>
            <option value="31">31ft+</option>
            <option value="35">35ft+</option>
            <option value="44">44ft+</option>
            <option value="50">50ft+</option>
          </select>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <div id="main">

      <!-- Sidebar -->
      <aside id="sidebar">
        <button id="sidebar-close" title="Close sidebar">&#10005;</button>

        <!-- Tabs -->
        <nav id="sidebar-tabs">
          <div class="sidebar-tab active" data-tab="detail">Detail</div>
          <div class="sidebar-tab" data-tab="compare">Compare</div>
          <div class="sidebar-tab" data-tab="history">History</div>
        </nav>

        <!-- Tab content -->
        <div id="sidebar-content">
          <div id="tab-detail"></div>
          <div id="tab-compare" style="display:none"></div>
          <div id="tab-history" style="display:none"></div>
        </div>
      </aside>

      <!-- Mobile legend drawer (hidden on desktop) -->
      <div id="mobile-legend-drawer">
        <div id="builder-legend-mobile"></div>
      </div>

      <!-- Map -->
      <div id="map">
        <div id="builder-legend"></div>
      </div>

    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Lead capture modal -->
  <div id="lead-modal-backdrop">
    <div id="lead-modal">
      <h2>Unlock Pricing</h2>
      <p>Enter your details to see real prices for all Ottawa new build communities — free, no spam.</p>
      <div class="lead-field">
        <label>Name</label>
        <input type="text" id="lead-name" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="lead-field">
        <label>Email</label>
        <input type="email" id="lead-email" placeholder="you@email.com" autocomplete="email" />
      </div>
      <div class="lead-field">
        <label>Phone (optional)</label>
        <input type="tel" id="lead-phone" placeholder="613-555-0100" autocomplete="tel" />
      </div>
      <div class="lead-actions">
        <button id="lead-modal-close">Cancel</button>
        <button id="lead-modal-submit">Get Prices →</button>
      </div>
    </div>
  </div>

  <!-- App modules -->
  <script type="module" src="app.js"></script>
</body>
</html>
